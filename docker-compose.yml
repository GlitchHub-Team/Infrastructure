services:
  timescale:
    image: timescale/timescaledb:2.25.2-pg18
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPORT: ${POSTGRES_PORT}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./timescale/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  cloud-db:
    image: postgres:18.3

    environment:
      POSTGRES_DB: ${CLOUD_POSTGRES_DB}
      POSTGRES_USER: ${CLOUD_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CLOUD_POSTGRES_PASSWORD}
      PGPORT: ${CLOUD_POSTGRES_PORT}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "${CLOUD_POSTGRES_PORT}:${CLOUD_POSTGRES_PORT}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${CLOUD_POSTGRES_USER} -d ${CLOUD_POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    environment:
      - ADMINER_DEFAULT_SERVER=${CLOUD_POSTGRES_HOST}
    ports:
      - "6767:8080"
    depends_on:
      - cloud-db

  nats:
    image: nats:2.12.5
    command: ["-config", "/etc/nats/nats.conf"]
    healthcheck:
      test: ["CMD", "nats-server", "--check", "server"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "${NATS_PORT}:${NATS_PORT}"
      - "${NATS_HTTP_PORT}:${NATS_HTTP_PORT}"
    environment:
      NATS_ENCRYPTION_KEY: ${NATS_ENCRYPTION_KEY}
      NATS_PORT: ${NATS_PORT}
      NATS_HTTP_PORT: ${NATS_HTTP_PORT}
      NATS_SYS_ACCOUNT_ID: ${NATS_SYS_ACCOUNT_ID}
      NATS_APPLICATION_CORE_ID: ${NATS_APPLICATION_CORE_ID}
    volumes:
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
      - ./nats/certs:/etc/nats/certs:ro
      - ./nats/jwt-accounts:/etc/nats/jwt-accounts

  nats-manager:
    image: natsio/nats-box:0.19.3
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - ./natsManager/setup-nats.sh:/setup-nats.sh:ro
      - ./natsManager/ca.pem:/ca.pem:ro
      - ./natsManager/stream_setupper.creds:/stream_setupper.creds:ro
      - ./natsManager/stores:/nsc/stores
      - ./natsManager/keys:/nsc/keys
      - nsc-config-internal:/nsc/.config/nats/nsc
    entrypoint: ["sh", "-c", "/setup-nats.sh && tail -f /dev/null"]
    environment:
      NATS_URL: nats://nats:${NATS_PORT}
      NSC_STORES: /nsc/stores
      NKEYS_PATH: /nsc/keys
  
  nats-exporter:
    image: natsio/prometheus-nats-exporter:0.19.2
    ports:
        - "7777:7777"
    command:
        - "-varz"
        - "http://${NATS_HOST}:${NATS_HTTP_PORT}"
    volumes:
        - ./natsExporter/certs/ca.pem:/etc/nats/certs/ca.pem:ro
    depends_on:
        - nats
  
  prometheus:
    image: prom/prometheus:v3.10.0
    ports:
    - "9090:9090"
    volumes:
    - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
    - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
    - nats
    - nats-exporter

  grafana:
    image: grafana/grafana:12.4.1
    ports:
    - "3000:3000"
    environment:
    - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
    - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    - GF_USERS_ALLOW_SIGN_UP=${GF_USERS_ALLOW_SIGN_UP}
    volumes:
    - ./grafana/provisioning:/etc/grafana/provisioning:ro
    - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
    - prometheus

volumes:
  timescale-data:
  pgdata:
  nats-js-data:
  nsc-config-internal:
