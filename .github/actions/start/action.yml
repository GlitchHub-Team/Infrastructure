name: Infrastructure setup
description: "Sets up NATS, TimescaleDB, NATS Manager and Credentials"
inputs:
  NATS_STREAM_SETUPPER_CREDS:
    description: "NATS Stream Setupper Credentials"
    required: true
  NATS_SERVER_TLS_KEY:
    description: "NATS Server Key TLS"
    required: true
  GATEWAY1_CREDS:
    description: "Gateway 1 Credentials"
    required: true
  GATEWAY2_CREDS:
    description: "Gateway 2 Credentials"
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout Infrastruttura
      uses: actions/checkout@v4
      with:
        repository: GlitchHub-Team/Infrastructure
        path: Infrastructure

    - name: Init integration credentials
      shell: bash
      run: |
        set -euo pipefail

        if [ -z "${{ inputs.NATS_STREAM_SETUPPER_CREDS }}" ]; then
          echo "::error::Missing secret NATS_STREAM_SETUPPER_CREDS"
          exit 1
        fi

        mkdir -p Infrastructure/natsManager
        printf '%s\n' "${{ inputs.NATS_STREAM_SETUPPER_CREDS }}" > Infrastructure/natsManager/stream_setupper.creds

        chmod 600 Infrastructure/natsManager/stream_setupper.creds

        if [ -z "${{ inputs.GATEWAY1_CREDS }}" ]; then
          echo "::error::Missing secret GATEWAY1_CREDS"
          exit 1
        fi

        if [ -z "${{ inputs.GATEWAY2_CREDS }}" ]; then
          echo "::error::Missing secret GATEWAY2_CREDS"
          exit 1
        fi

        mkdir -p Infrastructure/testCreds
        printf '%s\n' "${{ inputs.GATEWAY1_CREDS }}" > Infrastructure/testCreds/gateway1.creds
        printf '%s\n' "${{ inputs.GATEWAY2_CREDS }}" > Infrastructure/testCreds/gateway2.creds
        chmod 600 Infrastructure/testCreds/gateway1.creds Infrastructure/testCreds/gateway2.creds

        if [ ! -f Infrastructure/nats/certs/server.key ]; then
          if [ -z "${{ inputs.NATS_SERVER_TLS_KEY }}" ]; then
            echo "::error::Missing secret NATS_SERVER_TLS_KEY (required when Infrastructure/nats/certs/server.key is not committed)"
            exit 1
          fi

          mkdir -p Infrastructure/nats/certs
          printf '%s\n' "${{ inputs.NATS_SERVER_TLS_KEY }}" > Infrastructure/nats/certs/server.key
          chmod 600 Infrastructure/nats/certs/server.key
        fi

    - name: Start integration dependencies
      shell: bash
      run: |
        set -euo pipefail
        docker compose -f Infrastructure/docker-compose.yml down -v
        docker compose -f Infrastructure/docker-compose.yml up -d

        echo "Recupero ID del container nats-manager..."
        MANAGER_ID=$(docker compose -f Infrastructure/docker-compose.yml ps -q nats-manager)

        echo "Attendendo che il setup di NATS sia completato..."

        # Loop di attesa sui log
        TIMEOUT=60
        COUNTER=0
        until docker logs "$MANAGER_ID" 2>&1 | grep -q "Setup completed!"; do
          if [ $COUNTER -ge $TIMEOUT ]; then
            echo "ERRORE: Timeout raggiunto. Il setup non è terminato entro $TIMEOUT secondi."
            docker compose -f Infrastructure/docker-compose.yml logs nats-manager
            exit 1
          fi
          
          # Controllo se il container è crashato nel frattempo
          if ! docker ps -q --filter "id=$MANAGER_ID" | grep -q . ; then
            echo "ERRORE: Il container nats-manager si è fermato inaspettatamente."
            docker compose -f Infrastructure/docker-compose.yml logs nats-manager
            exit 1
          fi

          echo "Setup in corso... ($COUNTER/$TIMEOUT)"
          sleep 2
          COUNTER=$((COUNTER + 2))
        done

        echo "Setup NATS rilevato nei log! Procedo con i test..."
